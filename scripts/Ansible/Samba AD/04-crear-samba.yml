---
- name: Crear instancia EC2
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    admin_password: "Admin1234!"
    user_password: "User1234!"
    region: "us-east-1"
    ami_id: "ami-0e86e20dae9224db8"
    instance_type: "t3.nano"
    key_name: "vockey"
    pem_file: "~/Downloads/labsuser.pem"
    domain_realm: "INNOVATETECH.LOCAL"
    domain_netbios: "INNOVATETECH"
    admin_user: "innovatech"
    pub_key: "~/.ssh/innovatetech_key.pub"
    ad_users:
      - { username: noel,   password: "{{ user_password }}", given_name: "Noel",   surname: "Admin" }
      - { username: josep,  password: "{{ user_password }}", given_name: "Josep",  surname: "Admin" }
      - { username: samu,   password: "{{ user_password }}", given_name: "Samu",   surname: "Admin" }
      - { username: hector, password: "{{ user_password }}", given_name: "Hector", surname: "Admin" }

  tasks:
    - name: Crear Security Group
      amazon.aws.ec2_security_group:
        name: sg-samba-ad
        description: "Samba AD InnovateTech"
        region: "{{ region }}"
        aws_access_key: "{{ aws_access_key }}"
        aws_secret_key: "{{ aws_secret_key }}"
        session_token: "{{ aws_session_token }}"
        rules:
          - proto: tcp
            ports: [22, 53, 88, 135, 139, 389, 445, 464, 636, 3268, 3269]
            cidr_ip: "0.0.0.0/0"
          - proto: udp
            ports: [53, 88, 389, 464]
            cidr_ip: "0.0.0.0/0"
        rules_egress:
          - proto: all
            cidr_ip: "0.0.0.0/0"
        state: present
      register: sg

    - name: Crear instancia EC2 Ubuntu 24.04
      amazon.aws.ec2_instance:
        name: dc1-innovatetech
        region: "{{ region }}"
        aws_access_key: "{{ aws_access_key }}"
        aws_secret_key: "{{ aws_secret_key }}"
        session_token: "{{ aws_session_token }}"
        key_name: "{{ key_name }}"
        instance_type: "{{ instance_type }}"
        image_id: "{{ ami_id }}"
        security_groups: ["sg-samba-ad"]
        volumes:
          - device_name: /dev/sda1
            ebs:
              volume_size: 20
              volume_type: gp3
              delete_on_termination: true
        network:
          assign_public_ip: true
        tags:
          Name: dc1-innovatetech
          ManagedBy: Ansible
        state: running
        wait: true
      register: ec2

    - name: Asignar Elastic IP
      amazon.aws.ec2_eip:
        region: "{{ region }}"
        aws_access_key: "{{ aws_access_key }}"
        aws_secret_key: "{{ aws_secret_key }}"
        session_token: "{{ aws_session_token }}"
        device_id: "{{ ec2.instances[0].instance_id }}"
        in_vpc: true
      register: eip

    - name: Esperar SSH
      wait_for:
        host: "{{ eip.public_ip }}"
        port: 22
        delay: 15
        timeout: 300

    - name: Registrar host en memoria
      add_host:
        name: dc1
        ansible_host: "{{ eip.public_ip }}"
        ansible_user: ubuntu
        ansible_ssh_private_key_file: "{{ pem_file }}"
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
        groups: dc
        domain_realm: "{{ domain_realm }}"
        domain_netbios: "{{ domain_netbios }}"
        admin_user: "{{ admin_user }}"
        pub_key: "{{ pub_key }}"
        ad_users: "{{ ad_users }}"
        admin_password: "{{ admin_password }}"

    - name: Mostrar IP publica
      debug:
        msg: "IP publica: {{ eip.public_ip }}"

# ──────────────────────────────────────────────────────
- name: Configurar Samba AD
  hosts: dc
  become: true
  gather_facts: true

  tasks:
    - name: Actualizar sistema
      apt:
        update_cache: yes
        upgrade: dist

    - name: Instalar chrony NTP
      apt:
        name: chrony
        state: present

    - name: Arrancar chrony
      service:
        name: chrony
        state: started
        enabled: yes

    - name: Sincronizar hora
      command: chronyc makestep
      changed_when: false

    - name: Crear usuario innovatech
      user:
        name: "{{ admin_user }}"
        shell: /bin/bash
        groups: sudo
        append: yes

    - name: Copiar clave publica
      authorized_key:
        user: "{{ admin_user }}"
        key: "{{ lookup('file', pub_key) }}"

    - name: Sudo sin contrasena
      copy:
        dest: "/etc/sudoers.d/{{ admin_user }}"
        content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL"
        mode: '0440'

    - name: Hardening SSH
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
        - { regexp: "^#?PubkeyAuthentication",   line: "PubkeyAuthentication yes" }
        - { regexp: "^#?PermitRootLogin",         line: "PermitRootLogin no" }
      notify: Reiniciar SSH

    - name: Configurar hostname
      hostname:
        name: dc1.innovatetech.local

    - name: Configurar /etc/hosts
      lineinfile:
        path: /etc/hosts
        line: "{{ ansible_default_ipv4.address }} dc1.innovatetech.local dc1"

    - name: Instalar Samba y dependencias
      apt:
        name:
          - samba
          - smbclient
          - winbind
          - libnss-winbind
          - libpam-winbind
          - krb5-config
          - krb5-user
          - dnsutils
          - net-tools
        state: present

    - name: Parar servicios que interfieren
      service:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - smbd
        - nmbd
        - winbind
      ignore_errors: yes

    - name: Comprobar si ya esta provisionado
      stat:
        path: /var/lib/samba/private/sam.ldb
      register: samba_done

    - name: Eliminar smb.conf previo
      file:
        path: /etc/samba/smb.conf
        state: absent
      when: not samba_done.stat.exists

    - name: Provisionar dominio AD
      command: >
        samba-tool domain provision
        --use-rfc2307
        --realm={{ domain_realm }}
        --domain={{ domain_netbios }}
        --server-role=dc
        --dns-backend=SAMBA_INTERNAL
        --adminpass={{ admin_password }}
      when: not samba_done.stat.exists

    - name: Copiar krb5.conf
      copy:
        src: /var/lib/samba/private/krb5.conf
        dest: /etc/krb5.conf
        remote_src: yes

    - name: Arrancar samba-ad-dc
      service:
        name: samba-ad-dc
        state: started
        enabled: yes

    - name: Esperar LDAP
      wait_for:
        port: 389
        host: 127.0.0.1
        delay: 5
        timeout: 60

    - name: Crear usuarios AD
      command: >
        samba-tool user create {{ item.username }} {{ item.password }}
        --given-name="{{ item.given_name }}"
        --surname="{{ item.surname }}"
        -U administrator --password={{ admin_password }}
      loop: "{{ ad_users }}"
      ignore_errors: yes

    - name: Añadir usuarios a Domain Admins
      command: >
        samba-tool group addmembers "Domain Admins" {{ item.username }}
        -U administrator --password={{ admin_password }}
      loop: "{{ ad_users }}"
      ignore_errors: yes

